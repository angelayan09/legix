<body>

<section class="section" id="simplifier">
  <div class="legaltextsimp"><h2>Legal Text Simplifier</h2>
  <p>Paste text, upload a file, or enter a URL to simplify complex legal text.</p>

  <!-- Input Options -->
  <div class="simplifier-inputs">
    <textarea id="textInput" rows="6" placeholder="Paste your text here..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;"></textarea>

    <p style="margin:10px 0; font-weight:bold;">OR</p>
    
    <input type="url" id="urlInput" placeholder="Paste a URL here..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">
  </div>

  <!-- Simplify Button -->
  <button id="simplifyBtn" style="margin-top:15px; padding:12px 24px; border:none; border-radius:8px; background-color:#ffab4a; color:#000000; font-weight:bold; cursor:pointer;">Simplify</button>

  <!-- Output Sections -->
  <p id="statusMsg" style="display:none; margin-top:14px; font-weight:bold; color:#333;"></p>
<div id="billMetadata" style="display:none; margin-top:30px;"></div>
  
  <div class="results">
  <div id="simplifiedText" style="margin-top:30px; padding:20px; background-color:#fbe4c9; border-radius:12px; display:none;">
    <div class="output-box">
      <h3>Simplified Text</h3>
      <p id="simplifiedOutput"></p>
    </div>
  </div>

  <div id="summaryText" style="margin-top:20px; padding:20px; background-color:#fbe4c9; border-radius:12px; display:none;">
    <div class="output-box">
      <h3>Summary</h3>
      <p id="summaryOutput"></p>
    </div>
  </div>

  <div id="analysisText" style="margin-top:30px; padding:20px; background-color:#fbe4c9; border-radius:12px; display:none;">
    <div class="output-box">
      <h3>Analysis</h3>
      <p id="analysisOutput"></p>
    </div>
  </div>

  <div id="translateSection" style="margin-top:20px;">
  <label for="languageSelect"><strong>Translate to:</strong></label>
  <select id="languageSelect" style="padding:8px; border-radius:6px;">
    <option value="Spanish">Spanish</option>
    <option value="Chinese">Chinese</option>
    <option value="French">French</option>
    <option value="Korean">Korean</option>
    <option value="Tagalog">Tagalog</option>
    <option value="Hindi">Hindi</option>
    <option value="Arabic">Arabic</option>
    <option value="Vietnamese">Vietnamese</option>
  </select>
  <button id="translateBtn"
    style="margin-left:10px; padding:10px 18px; border:none; border-radius:8px; background:#4CAF50; color:white; font-weight:bold; cursor:pointer;">
    Translate
  </button>
</div>

  <div class="action">
  <div id="actions" style="margin-top:30px; padding:20px; background-color:#fbe4c9; border-radius:12px;">
    <h3>Take Action</h3>
      <textarea id="zipInput" rows="1" placeholder="Enter zip code before pressing simplify" style="width:30%; padding:12px; border-radius:8px; border:1px solid #ccc;"></textarea>
      <ul id="actionOutput" style="list-style:none; padding-left:0;"></ul>
  </div>
  </div>

  </div>
  </div>
</section>

<footer>
